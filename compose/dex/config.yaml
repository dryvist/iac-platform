# Dex for Terrakube: GitHub-connector-only (no local passwords, no LDAP).
# Secrets AND the real domain arrive as env vars ($DEX_GITHUB_CLIENT_ID/
# _SECRET, $DOMAIN) from the sops env at deploy time — dex expands $ENV in
# this file itself, so no real hostname is ever committed.
issuer: https://terrakube-dex.$DOMAIN/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556
  # Replaces the upstream reference's Traefik CORS middleware: the UI origin
  # must be allowed to hit dex from the browser.
  allowedOrigins:
    - 'https://terrakube.$DOMAIN'

oauth2:
  responseTypes: ["code"]

expiry:
  # Generous idToken lifetime: "login once per machine" ergonomics. Re-login
  # after expiry is a single browser redirect (already GitHub-authenticated).
  idTokens: 720h

staticClients:
  - id: terrakube-app
    name: Terrakube
    public: true
    redirectURIs:
      - https://terrakube.$DOMAIN
      # tofu/terraform login device flow callbacks (CLI-driven workflow).
      - http://localhost:10000/login
      - http://localhost:10001/login

connectors:
  - type: github
    id: github
    name: GitHub
    config:
      clientID: $DEX_GITHUB_CLIENT_ID
      clientSecret: $DEX_GITHUB_CLIENT_SECRET
      redirectURI: https://terrakube-dex.$DOMAIN/dex/callback
      # Only members of this org team can log in; the emitted group claim
      # "dryvist:terrakube-admins" is Terrakube's admin group.
      orgs:
        - name: dryvist
          teams:
            - terrakube-admins
      teamNameField: slug
      loadAllGroups: false
