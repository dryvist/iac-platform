# Dex for Terrakube: OpenBao OIDC connector only (no local passwords or LDAP).
# Secrets AND the real domain arrive as env vars from OpenBao at deploy time,
# so no real hostname is ever committed. Two templating passes run: the dex
# image renders the whole file with gomplate at container start (Go-template
# .Env lookups), then dex applies its own $VAR expansion to the connector config
# block only. Domain refs therefore use gomplate .Env in top-level fields; the
# OpenBao issuer/client values stay $VAR so Dex expands them post-parse. NB
# gomplate renders
# comments too, so this note avoids literal template braces.
issuer: https://terrakube-dex.{{ .Env.DOMAIN }}/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556
  # Replaces the upstream reference's Traefik CORS middleware: the UI origin
  # must be allowed to hit dex from the browser.
  allowedOrigins:
    - 'https://terrakube.{{ .Env.DOMAIN }}'

oauth2:
  responseTypes: ["code"]

expiry:
  # Generous idToken lifetime: "login once per machine" ergonomics. Re-login
  # after expiry is a single browser redirect (already GitHub-authenticated).
  idTokens: 720h

staticClients:
  - id: terrakube-app
    name: Terrakube
    public: true
    redirectURIs:
      - https://terrakube.{{ .Env.DOMAIN }}
      # tofu/terraform login device flow callbacks (CLI-driven workflow).
      - http://localhost:10000/login
      - http://localhost:10001/login

connectors:
  - type: oidc
    id: openbao
    name: OpenBao
    config:
      issuer: $OPENBAO_OIDC_ISSUER
      clientID: $DEX_OPENBAO_CLIENT_ID
      clientSecret: $DEX_OPENBAO_CLIENT_SECRET
      redirectURI: https://terrakube-dex.{{ .Env.DOMAIN }}/dex/callback
      scopes: [openid, profile, email, groups]
      getUserInfo: true
      # OpenBao is the authoritative internal identity provider. Its custom
      # OIDC scopes emit email/profile/groups claims, and the client assignment
      # limits login to approved operator entities/groups.
      insecureSkipEmailVerified: true
      insecureEnableGroups: true
      allowedGroups: [terrakube-admins]
